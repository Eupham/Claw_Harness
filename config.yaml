# Initial config for deploying OpenClaw alongside vLLM-powered Qwen model on Modal

name: "openclaw-qwen-deployment"

# Dependency Versions
versions:
  modal: ">=1.4.1"
  vllm: "0.18.1"
  huggingface_hub: ">=0.24.0"
  openclaw: "latest"

# Modal Environment
modal:
  volume_name: "openclaw-qwen-weights"
  mount_path: "/data"
  secrets:
    - "huggingface-token" # Assumes a Modal Secret named 'huggingface-token' is set
    - "openclaw-secrets"

# Hugging Face Models
models:
  # Base or Instruct variant
  default: "Qwen/Qwen3-14B-Instruct-2507"
  # Coder variant
  coder: "Qwen/Qwen3-Coder-30B-A3B-Instruct"

  # The model to be currently deployed
  active: "Qwen/Qwen3-Coder-30B-A3B-Instruct"

# Target GPU Specifications
gpu:
  type: "A100" # Or "H100", "L4", etc.
  count: 1
  memory_snapshot: true

# Environment variables to pass to the Modal container
# Note: You do NOT need any OpenAI or Anthropic API keys.
# Ensure the following environment variables are set locally before deployment:
# - MODAL_TOKEN_ID: Your Modal Token ID
# - MODAL_TOKEN_SECRET: Your Modal Token Secret
# - HF_TOKEN: Your Hugging Face API token (must have access to gated models if needed)
env:
  HF_HOME: "/data/huggingface"
  VLLM_SERVER_DEV_MODE: "1" # Exposes /sleep and /wake_up
  PORT: "18789" # OpenClaw GUI port

# vLLM Engine specifications
vllm:
  port: 8000
  host: "0.0.0.0"
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  sleep_mode: true
